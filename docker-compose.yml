services:
  noop:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - noop-data:/data
      - noop-knowledge:/app/knowledge
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  noop-data:
  noop-knowledge:
